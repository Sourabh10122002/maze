<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MAZE TOYS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; }

body {
  font-family: 'Space Mono', monospace;
  background-color: #ece9e3;
  background-image: repeating-linear-gradient(
    -45deg,
    transparent 0px, transparent 6px,
    rgba(0,0,0,0.04) 6px, rgba(0,0,0,0.04) 7px
  );
}

canvas { position: fixed; top: 0; left: 0; display: block; }

/* ── HUD ──────────────────────────────────────────────── */
#hud {
  position: fixed;
  top: 18px; right: 18px;
  background: rgba(255, 255, 255, 0.90);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border: 1px solid rgba(0, 0, 0, 0.10);
  border-radius: 10px;
  padding: 16px 18px 14px;
  color: #111;
  z-index: 10;
  min-width: 148px;
  box-shadow: 0 2px 20px rgba(0,0,0,0.10);
}

.hud-brand {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 3px;
  color: #cc2200;
  padding-bottom: 10px;
  margin-bottom: 10px;
  border-bottom: 1px solid rgba(0,0,0,0.08);
}

.hud-row {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  padding: 3px 0;
  font-size: 10px;
  color: rgba(0,0,0,0.40);
  letter-spacing: 1px;
}
.hud-row strong {
  font-size: 16px;
  font-weight: 700;
  color: #111;
  letter-spacing: 0;
}
.hud-row.dim strong { color: rgba(0,0,0,0.45); font-size: 13px; }

.hud-sep { border: none; border-top: 1px solid rgba(0,0,0,0.08); margin: 10px 0; }

#btn-reset {
  width: 100%;
  padding: 7px 0;
  margin-top: 10px;
  font-family: inherit;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 2px;
  background: rgba(200, 34, 0, 0.07);
  color: #cc2200;
  border: 1px solid rgba(200, 34, 0, 0.20);
  border-radius: 6px;
  cursor: pointer;
  transition: background 0.15s;
}
#btn-reset:hover  { background: rgba(200, 34, 0, 0.14); }
#btn-reset:active { background: rgba(200, 34, 0, 0.22); }

/* ── Level badge (top-left) ───────────────────────────── */
#level-badge {
  position: fixed;
  top: 18px; left: 18px;
  background: rgba(255, 255, 255, 0.90);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border: 1px solid rgba(0,0,0,0.10);
  border-radius: 10px;
  padding: 10px 16px;
  z-index: 10;
  box-shadow: 0 2px 20px rgba(0,0,0,0.10);
}
.badge-label { font-size: 9px; letter-spacing: 3px; color: rgba(0,0,0,0.35); }
.badge-value { font-size: 28px; font-weight: 700; color: #cc2200; line-height: 1.1; margin-top: 2px; }
.badge-sub   { font-size: 9px; color: rgba(0,0,0,0.35); margin-top: 2px; letter-spacing: 0.5px; }

/* ── Banner ───────────────────────────────────────────── */
#banner {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(240, 237, 231, 0.97);
  z-index: 40;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 14px;
  text-align: center;
}
#banner.show { display: flex; }

#banner .b-emoji {
  font-size: 72px;
  line-height: 1;
  filter: drop-shadow(0 4px 12px rgba(200, 50, 10, 0.30));
  animation: pop 0.4s cubic-bezier(.36,1.6,.5,1) both;
}

@keyframes pop {
  from { transform: scale(0.4); opacity: 0; }
  to   { transform: scale(1);   opacity: 1; }
}

#banner .b-label {
  font-size: 11px;
  letter-spacing: 4px;
  color: rgba(0,0,0,0.35);
  margin-bottom: -8px;
}

#banner h1 {
  font-size: 52px;
  font-weight: 700;
  letter-spacing: 5px;
  color: #cc2200;
  animation: fadein 0.5s 0.15s both;
}

@keyframes fadein {
  from { opacity: 0; transform: translateY(10px); }
  to   { opacity: 1; transform: translateY(0); }
}

#banner .b-stats {
  font-size: 12px;
  color: rgba(0,0,0,0.45);
  letter-spacing: 1px;
  animation: fadein 0.5s 0.2s both;
}
#banner .b-stats strong { color: #111; }

#banner .b-next {
  font-size: 10px;
  color: rgba(0,0,0,0.30);
  letter-spacing: 1px;
  animation: fadein 0.5s 0.25s both;
}

#banner .btn-next {
  margin-top: 6px;
  padding: 13px 44px;
  font-family: inherit;
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 3px;
  background: #cc2200;
  color: #fff;
  border: none;
  border-radius: 7px;
  cursor: pointer;
  box-shadow: 0 4px 20px rgba(200, 34, 0, 0.30);
  transition: box-shadow 0.15s, background 0.15s;
  animation: fadein 0.5s 0.3s both;
}
#banner .btn-next:hover  { background: #dd2800; box-shadow: 0 6px 28px rgba(200,34,0,0.40); }
#banner .btn-next:active { transform: scale(0.97); }

#banner .b-hint {
  font-size: 9px;
  color: rgba(0,0,0,0.20);
  letter-spacing: 2px;
  animation: fadein 0.5s 0.4s both;
}
</style>
</head>
<body>

<canvas id="canvas"></canvas>

<!-- Level badge top-left -->
<div id="level-badge">
  <div class="badge-label">LEVEL</div>
  <div class="badge-value" id="b-level">1</div>
  <div class="badge-sub" id="b-size">10 × 10</div>
</div>

<!-- Stats HUD top-right -->
<div id="hud">
  <div class="hud-brand">MAZE TOYS</div>
  <div class="hud-row"><span>TIME</span>   <strong id="h-time">0:00</strong></div>
  <div class="hud-row"><span>MOVES</span>  <strong id="h-moves">0</strong></div>
  <hr class="hud-sep">
  <div class="hud-row dim"><span>STREAK</span> <strong id="h-streak">0</strong></div>
  <div class="hud-row dim"><span>BEST</span>   <strong id="h-best">—</strong></div>
  <button id="btn-reset">↺  RESET</button>
</div>

<!-- Level-complete banner -->
<div id="banner">
  <div class="b-emoji">🍅</div>
  <div class="b-label">COMPLETE</div>
  <h1 id="ban-title">LEVEL 1</h1>
  <div class="b-stats" id="ban-stats"></div>
  <div class="b-next"  id="ban-next"></div>
  <button class="btn-next" id="btn-next">NEXT LEVEL →</button>
  <div class="b-hint">SPACE · ENTER · TAP</div>
</div>

<script>
'use strict';

// ── PRNG (mulberry32) ───────────────────────────────────────────────────
function makePRNG(seed) {
  return () => {
    seed |= 0;
    seed = (seed + 0x6D2B79F5) | 0;
    let t = Math.imul(seed ^ (seed >>> 15), 1 | seed);
    t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}
function dateSeed(d) {
  return d.getFullYear() * 10000 + (d.getMonth() + 1) * 100 + d.getDate();
}

// ── Maze generation ─────────────────────────────────────────────────────
function buildMaze(cols, rows, rng) {
  const OPP = {n:'s',s:'n',e:'w',w:'e'}, DX={n:0,s:0,e:1,w:-1}, DY={n:-1,s:1,e:0,w:0};
  const cell = Array.from({length:rows}, () => Array.from({length:cols}, () => new Set()));
  const vis  = Array.from({length:rows}, () => new Uint8Array(cols));
  vis[0][0] = 1;
  const stk = [{x:0,y:0}];
  while (stk.length) {
    const {x,y} = stk[stk.length-1];
    const nbrs = ['n','s','e','w'].filter(d => {
      const nx=x+DX[d], ny=y+DY[d];
      return nx>=0&&nx<cols&&ny>=0&&ny<rows&&!vis[ny][nx];
    });
    if (!nbrs.length) { stk.pop(); continue; }
    const d = nbrs[Math.floor(rng()*nbrs.length)];
    const nx=x+DX[d], ny=y+DY[d];
    cell[y][x].add(d); cell[ny][nx].add(OPP[d]);
    vis[ny][nx]=1; stk.push({x:nx,y:ny});
  }
  return cell;
}

// ── Audio ───────────────────────────────────────────────────────────────
let _ac = null;
function ac() { return _ac || (_ac = new (window.AudioContext||window.webkitAudioContext)()); }

function tone(freq, dur, vol=0.1, type='square', delay=0) {
  try {
    const a=ac(), o=a.createOscillator(), g=a.createGain();
    o.connect(g); g.connect(a.destination);
    o.type=type; o.frequency.setValueAtTime(freq, a.currentTime+delay);
    g.gain.setValueAtTime(vol, a.currentTime+delay);
    g.gain.exponentialRampToValueAtTime(0.001, a.currentTime+delay+dur);
    o.start(a.currentTime+delay); o.stop(a.currentTime+delay+dur);
  } catch(e){}
}

const sfx = {
  move: ()=> tone(220,0.04,0.05,'square'),
  wall: ()=> tone(95, 0.07,0.04,'sawtooth'),
  win:  ()=> [523,659,784,1047].forEach((f,i)=>tone(f,0.2,0.16,'sine',i*0.09)),
};

// ── Storage ─────────────────────────────────────────────────────────────
const SK = 'maze_toys_v5';
const load = ()=>{ try{return JSON.parse(localStorage.getItem(SK))||{};}catch{return{};} };
const save = d => localStorage.setItem(SK, JSON.stringify(d));

const today    = new Date();
const todayKey = `${today.getFullYear()}-${today.getMonth()+1}-${today.getDate()}`;
const DS       = dateSeed(today);

let st       = load();
let level    = (st.date===todayKey) ? (st.level||1) : 1;
let streak   = st.streak  || 0;
let longest  = st.longest || 0;
let lastDate = st.lastDate|| null;
let bests    = (st.date===todayKey) ? (st.bests||{}) : {};

// ── Canvas / DPR ────────────────────────────────────────────────────────
const canvas = document.getElementById('canvas');
const ctx    = canvas.getContext('2d');

function applyDPR() {
  const dpr = window.devicePixelRatio||1;
  canvas.width  = window.innerWidth  * dpr;
  canvas.height = window.innerHeight * dpr;
  canvas.style.width  = window.innerWidth  + 'px';
  canvas.style.height = window.innerHeight + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
applyDPR();

// ── Layout ──────────────────────────────────────────────────────────────
function levelSize(lvl) { return 10 + (lvl-1)*3; }

let COLS, ROWS, CELL, offX, offY, maze;
let px=0, py=0;
let visited; // ordered Set: keys "x,y" (most-recently-visited = last)
let moveCount=0, levelSolved=false;
let timerStart=null, timerElapsed=0, timerTick=null;

function calcLayout() {
  COLS = ROWS = levelSize(level);
  const vw=window.innerWidth, vh=window.innerHeight;
  CELL = Math.max(6, Math.floor((Math.min(vw,vh)*0.93)/COLS));
  offX = Math.floor((vw - COLS*CELL)/2);
  offY = Math.floor((vh - ROWS*CELL)/2);
}

// ── Trail color gradient ─────────────────────────────────────────────────
// t=0: #6b1a1a (deep dark red)  t=1: #ff6030 (bright orange-red)
function trailColor(t) {
  let r, g, b;
  if (t < 0.5) {
    const u = t*2;
    r = Math.round(107 + 113*u); // 107→220
    g = Math.round(26  +  12*u); // 26→38
    b = Math.round(26  +  12*u); // 26→38
  } else {
    const u = (t-0.5)*2;
    r = Math.round(220 + 35*u);  // 220→255
    g = Math.round(38  + 58*u);  // 38→96
    b = Math.round(38  + 10*u);  // 38→48
  }
  return `rgb(${r},${g},${b})`;
}

// ── Render ──────────────────────────────────────────────────────────────
let pulseT = 0;

function render(ts=0) {
  pulseT = ts * 0.003;

  const vw=window.innerWidth, vh=window.innerHeight;
  const W=COLS*CELL, H=ROWS*CELL;

  ctx.clearRect(0, 0, vw, vh);
  ctx.save();
  ctx.translate(offX, offY);

  // ── White maze background with subtle drop shadow ──
  ctx.save();
  ctx.shadowColor = 'rgba(0, 0, 0, 0.18)';
  ctx.shadowBlur  = 32;
  ctx.shadowOffsetY = 4;
  ctx.fillStyle   = '#ffffff';
  ctx.fillRect(0, 0, W, H);
  ctx.restore();
  // Crisp white fill on top (no shadow bleed inside)
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, W, H);

  // ── Trail (oldest → darkest, newest → brightest) ──
  const visitArr = [...visited];
  const total    = visitArr.length;
  visitArr.forEach((key, i) => {
    const [vx,vy] = key.split(',').map(Number);
    const t = total<=1 ? 1 : i/(total-1);
    ctx.fillStyle = trailColor(t);
    ctx.fillRect(vx*CELL, vy*CELL, CELL, CELL);
  });

  // ── Walls ──
  const lw = Math.max(1.5, Math.min(3.5, CELL*0.085));
  ctx.strokeStyle = '#0f0f0f';
  ctx.lineWidth   = lw;
  ctx.lineCap     = 'square';
  ctx.beginPath();
  for (let y=0; y<ROWS; y++) {
    for (let x=0; x<COLS; x++) {
      const o=maze[y][x], cx=x*CELL, cy=y*CELL;
      if (!o.has('n'))           { ctx.moveTo(cx,cy);      ctx.lineTo(cx+CELL,cy); }
      if (!o.has('w'))           { ctx.moveTo(cx,cy);      ctx.lineTo(cx,cy+CELL); }
      if (y===ROWS-1&&!o.has('s')){ ctx.moveTo(cx,cy+CELL); ctx.lineTo(cx+CELL,cy+CELL); }
      if (x===COLS-1&&!o.has('e')){ ctx.moveTo(cx+CELL,cy); ctx.lineTo(cx+CELL,cy+CELL); }
    }
  }
  ctx.stroke();

  // ── 🍅 goal ──
  const gfs = Math.max(10, Math.round(CELL*0.74));
  ctx.font=`${gfs}px serif`; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText('🍅', (COLS-1)*CELL+CELL/2, (ROWS-1)*CELL+CELL/2);

  // ── Player dot (pulsing white ring on the trail) ──
  if (!levelSolved) {
    const pulse = 0.82 + 0.18*Math.sin(pulseT*2.2);
    const r     = Math.max(3, CELL*0.19)*pulse;
    const pcx   = px*CELL+CELL/2, pcy=py*CELL+CELL/2;
    ctx.save();
    ctx.shadowColor='rgba(255,255,255,0.85)';
    ctx.shadowBlur = 10;
    ctx.fillStyle  = 'rgba(255,255,255,0.95)';
    ctx.beginPath(); ctx.arc(pcx, pcy, r, 0, Math.PI*2); ctx.fill();
    // Thin red ring so the dot reads on white cells near start
    ctx.strokeStyle = 'rgba(180,30,10,0.35)';
    ctx.lineWidth   = 1;
    ctx.stroke();
    ctx.restore();
  }

  ctx.restore(); // un-translate
}

// ── Animation loop ───────────────────────────────────────────────────────
function loop(ts) { render(ts); requestAnimationFrame(loop); }

// ── Timer ────────────────────────────────────────────────────────────────
function startTimer() {
  timerStart = Date.now(); timerElapsed = 0;
  timerTick  = setInterval(() => { timerElapsed=Date.now()-timerStart; refreshHUD(); }, 200);
}
function stopTimer() {
  clearInterval(timerTick); timerTick=null;
  if (timerStart) timerElapsed=Date.now()-timerStart;
}
function fmt(ms) {
  const s=Math.floor(ms/1000), m=Math.floor(s/60);
  return `${m}:${String(s%60).padStart(2,'0')}`;
}

// ── HUD refresh ──────────────────────────────────────────────────────────
function refreshHUD() {
  document.getElementById('h-time').textContent   = fmt(timerElapsed);
  document.getElementById('h-moves').textContent  = moveCount;
  document.getElementById('h-streak').textContent = streak;
  document.getElementById('h-best').textContent   = bests[level] ? fmt(bests[level]) : '—';
  document.getElementById('b-level').textContent  = level;
  document.getElementById('b-size').textContent   = `${COLS} × ${ROWS}`;
}

// ── Start a level ────────────────────────────────────────────────────────
function startLevel() {
  calcLayout();
  maze = buildMaze(COLS, ROWS, makePRNG(DS*100+level));
  px=0; py=0;
  visited  = new Set(['0,0']);
  moveCount=0; levelSolved=false;
  timerStart=null; timerElapsed=0;
  clearInterval(timerTick); timerTick=null;
  refreshHUD();
}

// ── Movement ─────────────────────────────────────────────────────────────
const DX={n:0,s:0,e:1,w:-1}, DY={n:-1,s:1,e:0,w:0};

function move(dir) {
  if (levelSolved) return;
  if (!maze[py][px].has(dir)) { sfx.wall(); return; }
  if (!timerStart) startTimer();

  px+=DX[dir]; py+=DY[dir]; moveCount++;
  sfx.move();

  // Ordered set: delete then re-add puts it at the newest end
  const key=`${px},${py}`;
  if (visited.has(key)) visited.delete(key);
  visited.add(key);

  refreshHUD();
  if (px===COLS-1 && py===ROWS-1) setTimeout(onWin, 160);
}

// ── Win ──────────────────────────────────────────────────────────────────
function onWin() {
  levelSolved=true; stopTimer(); sfx.win();

  if (lastDate!==todayKey) {
    const y=new Date(today); y.setDate(y.getDate()-1);
    const yKey=`${y.getFullYear()}-${y.getMonth()+1}-${y.getDate()}`;
    streak = (lastDate===yKey) ? streak+1 : 1;
    if (streak>longest) longest=streak;
    lastDate=todayKey;
  }
  if (!bests[level]||timerElapsed<bests[level]) bests[level]=timerElapsed;
  save({date:todayKey, level:level+1, streak, longest, lastDate, bests});
  refreshHUD();

  const nextN=levelSize(level+1);
  document.getElementById('ban-title').textContent = `LEVEL ${level}`;
  document.getElementById('ban-stats').innerHTML   =
    `Time <strong>${fmt(timerElapsed)}</strong>  ·  Moves <strong>${moveCount}</strong>  ·  Streak <strong>${streak}</strong>`;
  document.getElementById('ban-next').textContent  =
    bests[level]!==timerElapsed
      ? `Personal best: ${fmt(bests[level])}  ·  Next: ${nextN}×${nextN} maze`
      : `New best! 🔥  ·  Next: Level ${level+1}  —  ${nextN}×${nextN} maze`;
  document.getElementById('banner').classList.add('show');
}

function advance() {
  if (!levelSolved) return;
  document.getElementById('banner').classList.remove('show');
  level++;
  startLevel();
}

// ── Reset ────────────────────────────────────────────────────────────────
function reset() {
  clearInterval(timerTick); timerTick=null;
  px=0; py=0; visited=new Set(['0,0']);
  moveCount=0; levelSolved=false;
  timerStart=null; timerElapsed=0;
  refreshHUD();
}

// ── Events ───────────────────────────────────────────────────────────────
document.getElementById('btn-reset').addEventListener('click', reset);
document.getElementById('btn-next').addEventListener('click', advance);
document.getElementById('banner').addEventListener('click', advance);

const KEYS = {
  ArrowUp:'n',ArrowDown:'s',ArrowLeft:'w',ArrowRight:'e',
  w:'n',s:'s',a:'w',d:'e',
  k:'n',j:'s',h:'w',l:'e',
};
document.addEventListener('keydown', e => {
  if (document.getElementById('banner').classList.contains('show')) {
    if ([' ','Enter','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key))
      { e.preventDefault(); advance(); }
    return;
  }
  if (KEYS[e.key]) { e.preventDefault(); move(KEYS[e.key]); }
});

// Swipe
let tx=0, ty=0;
canvas.addEventListener('touchstart', e=>{ tx=e.touches[0].clientX; ty=e.touches[0].clientY; },{passive:true});
canvas.addEventListener('touchend', e=>{
  if (document.getElementById('banner').classList.contains('show')){ advance(); return; }
  const dx=e.changedTouches[0].clientX-tx, dy=e.changedTouches[0].clientY-ty;
  if (Math.abs(dx)<12&&Math.abs(dy)<12) return;
  move(Math.abs(dx)>Math.abs(dy) ? (dx>0?'e':'w') : (dy>0?'s':'n'));
},{passive:true});

window.addEventListener('resize', ()=>{ applyDPR(); calcLayout(); });

// ── Boot ─────────────────────────────────────────────────────────────────
startLevel();
requestAnimationFrame(loop);
</script>
</body>
</html>
